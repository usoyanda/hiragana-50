<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tachibana 日本語教室 — ひらがな50音</title>
<!--
  Stroke-order SVG animations: AnimCJK project (parsimonhi/animCJK), svgsJaKana set.
  Redistributed/modified under the GNU Lesser General Public License v3+.
  https://github.com/parsimonhi/animCJK — see licenses/COPYING.txt in that repo.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Work+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E9E4D6;
    --paper-deep:#DFD9C8;
    --card:#F6F2E7;
    --ink:#232A36;
    --ink-soft:#5B5A50;
    --vermilion:#B7402C;
    --vermilion-deep:#8F2F20;
    --gold:#A9832E;
    --line:rgba(35,42,54,0.14);
    --shadow: 0 18px 40px -20px rgba(35,42,54,0.35);
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% 8%, rgba(183,64,44,0.06), transparent 45%),
      radial-gradient(circle at 88% 92%, rgba(169,131,46,0.08), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  .jp{ font-family:'Zen Kaku Gothic New', sans-serif; }
  .mincho{ font-family:'Shippori Mincho B1', serif; }

  /* ---------- Header ---------- */
  header{
    width:100%;
    max-width:640px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 20px 10px;
  }
  .brand{ display:flex; flex-direction:column; line-height:1.05; }
  .brand .jp-title{ font-family:'Shippori Mincho B1', serif; font-weight:800; font-size:22px; letter-spacing:.04em; color:var(--ink); }
  .brand .en-title{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px; }

  .row-chip{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:14px;
    background:var(--card);
    border:1px solid var(--line);
    padding:6px 14px;
    border-radius:999px;
    color:var(--ink);
  }

  .stamp{
    position:relative;
    width:52px; height:52px;
    background:var(--vermilion);
    color:#F6F0E2;
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    transform:rotate(-4deg);
    box-shadow:0 8px 18px -8px rgba(143,47,32,0.65);
    flex-shrink:0;
  }
  .stamp .num{ font-family:'Work Sans',sans-serif; font-weight:800; font-size:14px; letter-spacing:.02em; }

  .topbar{
    width:100%; max-width:640px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
    gap:10px;
  }

  /* ---------- Main stage ---------- */
  main{
    width:100%;
    max-width:640px;
    padding:14px 20px 10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    flex:1;
  }

  .stage-card{
    width:100%;
    background:var(--card);
    border-radius:24px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    padding:26px 20px 22px;
    position:relative;
    overflow:hidden;
  }
  .stage-card::before{
    content:"";
    position:absolute; top:-40px; right:-40px;
    width:150px; height:150px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(169,131,46,0.14), transparent 70%);
  }

  .char-wrap{
    position:relative;
    width:min(62vw, 300px);
    height:min(62vw, 300px);
    margin:0 auto;
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0/100% 25%,
      linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0/25% 100%;
    background-color:#fff;
    border-radius:16px;
    border:1px solid var(--line);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action:manipulation;
  }
  .char-wrap svg{ width:78%; height:78%; display:block; }
  .char-wrap svg.acjk path[clip-path]{ stroke:var(--ink) !important; }

  .replay-hint{
    position:absolute; bottom:8px; right:10px;
    font-size:11px; color:var(--ink-soft);
    background:rgba(246,242,231,0.9);
    padding:3px 8px; border-radius:999px;
    border:1px solid var(--line);
    display:flex; align-items:center; gap:4px;
    pointer-events:none;
  }

  .romaji-row{
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:12px;
    margin-top:14px;
  }
  .romaji{
    text-align:center;
    font-family:'Work Sans', sans-serif;
    font-weight:800;
    font-size:34px;
    letter-spacing:.02em;
    color:var(--vermilion-deep);
  }
  .romaji-sep{ font-size:20px; color:var(--line); font-weight:400; }
  .romaji-ne{
    font-family:'Noto Sans Devanagari', sans-serif;
    font-weight:700;
    font-size:32px;
    color:var(--gold);
  }
  .speak-btn{
    background:var(--card);
    border:1.5px solid var(--line);
    width:40px; height:40px;
    border-radius:50%;
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    margin-left:4px;
    flex-shrink:0;
  }
  .speak-btn:active{ transform:scale(.92); }
  .speak-btn.playing{ border-color:var(--vermilion); background:#fff; }

  .example-card{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--paper-deep);
    border-radius:14px;
    border-top:3px solid var(--gold);
    padding:14px 16px;
  }
  .example-emoji{ font-size:32px; line-height:1; flex-shrink:0; }
  .example-text{ display:flex; flex-direction:column; gap:2px; }
  .example-kana{ font-family:'Zen Kaku Gothic New',sans-serif; font-weight:700; font-size:20px; }
  .example-sub{ font-size:13px; color:var(--ink-soft); }
  .example-sub .romaji-small{ font-weight:600; color:var(--ink); }
  .example-ne{
    font-family:'Noto Sans Devanagari', sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--vermilion-deep);
    margin-top:3px;
  }
  .example-ne::before{ content:"NP "; font-size:10px; font-weight:800; color:var(--gold); letter-spacing:.06em; }

  /* ---------- Nav controls ---------- */
  .nav{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
  }
  button{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    border:none;
    border-radius:12px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .nav-btn{
    background:var(--ink);
    color:var(--paper);
    font-size:16px;
    padding:14px 10px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:transform .12s ease, opacity .12s ease;
  }
  .nav-btn:active{ transform:scale(.96); }
  .nav-btn:disabled{ opacity:.35; cursor:default; }
  .replay-btn{
    background:var(--vermilion);
    color:#fff;
    font-size:15px;
    padding:14px 16px;
    white-space:nowrap;
  }
  .replay-btn:active{ transform:scale(.96); }
  .play-btn{
    background:var(--gold);
    color:#fff;
    font-size:15px;
    padding:14px 16px;
    white-space:nowrap;
  }
  .play-btn:active{ transform:scale(.96); }
  .play-btn.playing{ background:var(--vermilion-deep); }

  :focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

  /* ---------- Progress dots ---------- */
  .progress-wrap{
    width:100%;
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    justify-content:center;
  }
  .dot{
    width:10px; height:10px;
    border-radius:50%;
    background:var(--line);
    cursor:pointer;
    border:none;
    padding:0;
  }
  .dot.active{ background:var(--vermilion); transform:scale(1.3); }
  .dot.done{ background:var(--gold); }

  .grid-toggle{
    margin-top:18px;
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--ink);
    padding:11px 20px;
    font-size:14px;
    border-radius:999px;
  }

  footer{
    max-width:640px;
    width:100%;
    text-align:center;
    color:var(--ink-soft);
    font-size:11px;
    padding:18px 20px 26px;
    line-height:1.6;
  }

  /* ---------- Overview modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(28,24,18,0.55);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:26px 14px;
    overflow-y:auto;
    z-index:50;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background:var(--paper);
    border-radius:20px;
    max-width:720px;
    width:100%;
    padding:22px 18px 26px;
    box-shadow:var(--shadow);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .modal-head h2{
    font-family:'Shippori Mincho B1',serif;
    font-size:20px; margin:0;
  }
  .modal-close{
    background:var(--ink); color:var(--paper);
    width:34px; height:34px; border-radius:50%;
    font-size:16px; display:flex; align-items:center; justify-content:center;
  }
  .gyou-block{ margin-bottom:16px; }
  .gyou-label{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700; font-size:13px;
    color:var(--vermilion-deep);
    margin-bottom:8px;
    padding-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .gyou-grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:8px;
  }
  .kana-cell{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 4px 8px;
    text-align:center;
    cursor:pointer;
  }
  .kana-cell:hover{ border-color:var(--vermilion); }
  .kana-cell .glyph{ font-family:'Zen Kaku Gothic New',sans-serif; font-size:26px; font-weight:700; line-height:1.1; }
  .kana-cell .rmj{ font-family:'Work Sans','Noto Sans Devanagari',sans-serif; font-size:10px; color:var(--ink-soft); margin-top:2px; }

  @media (max-width:380px){
    .romaji{ font-size:28px; }
    .gyou-grid{ grid-template-columns:repeat(4,1fr); }
  }

  @media (prefers-reduced-motion: reduce){
    svg.acjk path[clip-path]{ animation-duration:0.01s !important; }
  }

  /* ---------- Cover / Title screen ---------- */
  .app-wrap{ display:none; width:100%; flex-direction:column; align-items:center; }
  .app-wrap.visible{ display:flex; }

  .cover-screen{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    min-height:100vh;
    width:100%;
    padding:0 24px 40px;
    background:var(--paper);
    overflow:hidden;
  }
  .cover-screen.hidden{ display:none; }

  .cover-illust{
    width:100%;
    max-width:900px;
    height:190px;
    display:block;
  }

  .flag-tag{
    margin-top:-26px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 14px;
    font-size:13px;
    box-shadow:0 6px 14px -8px rgba(35,42,54,0.3);
    z-index:1;
  }

  .cover-stamp{
    width:60px; height:60px;
    background:var(--vermilion);
    color:#F6F0E2;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    transform:rotate(-5deg);
    box-shadow:0 10px 22px -8px rgba(143,47,32,0.6);
    margin-top:22px;
  }
  .cover-title{
    font-weight:800;
    font-size:38px;
    line-height:1.25;
    color:var(--ink);
    letter-spacing:.02em;
    margin-top:20px;
  }
  .cover-sub{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:22px;
    color:var(--vermilion-deep);
    margin-top:12px;
  }
  .cover-divider{
    width:140px;
    height:4px;
    margin-top:20px;
    border-radius:999px;
    background:linear-gradient(90deg, #8F1F2B 0%, var(--gold) 50%, #1F3A63 100%);
  }
  .cover-desc{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:16px;
    letter-spacing:.03em;
  }
  .cover-start{
    margin-top:34px;
    background:var(--ink);
    color:var(--paper);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:17px;
    padding:16px 38px;
    border-radius:999px;
    box-shadow:var(--shadow);
  }
  .cover-start:active{ transform:scale(.97); }

  @media (max-width:480px){
    .cover-illust{ height:150px; }
    .cover-title{ font-size:30px; }
  }

  /* ---------- Mascots ---------- */
  .cover-mascots{
    display:flex;
    gap:56px;
    margin-top:22px;
    align-items:flex-end;
  }
  .cover-mascot-item{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .cover-mascot{
    width:84px; height:91px;
    filter:drop-shadow(0 8px 12px rgba(35,42,54,0.25));
    animation:mascotFloat 3.2s ease-in-out infinite;
  }
  .cover-mascot-item:nth-child(2) .cover-mascot{ animation-delay:1.1s; }
  .mascot-name{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:11px;
    font-weight:700;
    color:var(--ink-soft);
  }

  .mascot-badge{
    position:absolute;
    top:14px; right:14px;
    width:52px; height:56px;
    background:var(--card);
    border-radius:50%;
    border:1px solid var(--line);
    box-shadow:0 8px 16px -8px rgba(35,42,54,0.35);
    padding:4px;
    transform:rotate(-6deg);
    z-index:2;
    animation:mascotFloat 3.2s ease-in-out infinite;
  }
  .mascot-badge svg{ width:100%; height:100%; display:block; }

  @keyframes mascotFloat{
    0%, 100%{ transform:translateY(0) rotate(-6deg); }
    50%{ transform:translateY(-5px) rotate(-3deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .mascot-badge, .cover-mascot{ animation:none; }
  }
</style>
</head>
<body>

<div class="cover-screen" id="coverScreen">
  <svg class="cover-illust" viewBox="0 0 800 260" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <!-- sky -->
    <rect x="0" y="0" width="800" height="200" fill="url(#skyGrad)"/>
    <!-- sun (Hinomaru x Nepal flag sun) -->
    <circle cx="470" cy="150" r="48" fill="url(#sunGrad)"/>
    <!-- Nepal flag crescent moon motif -->
    <path d="M562 96 a20 20 0 1 0 2 34 a15 15 0 1 1 -2 -34 Z" fill="#F6F2E7" opacity="0.9"/>
    <!-- Himalaya far range -->
    <polygon points="0,190 60,110 110,160 170,90 230,150 290,105 350,190" fill="#5578A8" opacity="0.55"/>
    <!-- Himalaya near range -->
    <polygon points="0,190 40,140 90,185 150,100 210,185 270,130 330,190 380,150 430,190" fill="#1F3A63"/>
    <!-- snow caps (Himalaya) -->
    <polygon points="150,100 163,122 137,122" fill="#F6F2E7"/>
    <polygon points="270,130 281,148 259,148" fill="#F6F2E7"/>
    <!-- Fuji-style peak (Japan) -->
    <polygon points="520,190 630,45 740,190" fill="#232A36"/>
    <polygon points="630,45 651,80 609,80" fill="#F6F2E7"/>
    <path d="M540,140 Q630,120 720,140 L740,190 L520,190 Z" fill="#232A36"/>
    <rect x="500" y="150" width="260" height="18" fill="#E9E4D6" opacity="0.85"/>
    <!-- ground -->
    <rect x="0" y="190" width="800" height="70" fill="var(--paper-deep)"/>
    <line x1="0" y1="190" x2="800" y2="190" stroke="var(--ink)" stroke-opacity="0.15" stroke-width="1.5"/>
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#EFE7D6"/>
        <stop offset="100%" stop-color="#F3D9C8"/>
      </linearGradient>
      <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#C6432D"/>
        <stop offset="100%" stop-color="#8F1F2B"/>
      </linearGradient>
    </defs>
  </svg>
  <div class="flag-tag">🇯🇵 × 🇳🇵</div>
  <div class="cover-stamp">㊀</div>
  <div class="cover-title mincho">Tachibana<br>日本語教室</div>
  <div class="cover-sub jp">ひらがな 50音</div>
  <div class="cover-divider"></div>
  <div class="cover-desc">書き順アニメーション ／ ローマ字 ／ ネパール語対応</div>
  <div class="cover-mascots">
    <div class="cover-mascot-item">
      <div class="cover-mascot" id="coverMascotL"></div>
      <span class="mascot-name">きち</span>
    </div>
    <div class="cover-mascot-item">
      <div class="cover-mascot" id="coverMascotR"></div>
      <span class="mascot-name">にゃんくま</span>
    </div>
  </div>
  <button class="cover-start" id="coverStart">はじめる ▶</button>
</div>

<div class="app-wrap" id="appWrap">

<header>
  <div class="brand">
    <span class="jp-title">Tachibana 日本語教室</span>
    <span class="en-title">ひらがな50音</span>
  </div>
  <div class="stamp"><span class="num" id="stampNum">01</span></div>
</header>

<div class="topbar">
  <span class="row-chip" id="rowChip">あ行</span>
  <span class="row-chip" id="countChip" style="background:transparent;border-color:transparent;color:var(--ink-soft);">01 / 46</span>
</div>

<main>
  <div class="stage-card">
    <div class="char-wrap" id="charWrap" tabindex="0" role="button" aria-label="文字をタップすると書き順アニメーションをもう一度再生します">
      <div class="replay-hint">↻ タップで再生</div>
    </div>
    <div class="mascot-badge" id="mascotBadge"></div>
    <div class="romaji-row">
      <div class="romaji" id="romaji">a</div>
      <div class="romaji-sep">/</div>
      <div class="romaji-ne" id="romajiNe">अ</div>
    </div>

    <div class="example-card">
      <div class="example-emoji" id="exEmoji">🌅</div>
      <div class="example-text">
        <div class="example-kana jp" id="exKana">あさ</div>
        <div class="example-sub"><span class="romaji-small" id="exRomaji">asa</span> — <span id="exMeaning">morning</span></div>
        <div class="example-ne" id="exMeaningNe">बिहान</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">◀ 前 (Prev)</button>
    <button class="nav-btn" id="nextBtn">次 (Next) ▶</button>
    <button class="replay-btn" id="replayBtn">↻ もう一度</button>
    <button class="play-btn" id="playBtn">▶ スタート</button>
  </div>

  <div class="progress-wrap" id="progressWrap"></div>

  <button class="grid-toggle" id="gridToggle">五十音一覧を見る（全46文字）</button>
</main>

<footer>
  Tachibana 日本語教室 ひらがな学習教材 ｜ 矢印キー：前後移動 ／ スペース：再生 ／ 文字をタップで書き順再生<br>
  書き順アニメーション: AnimCJK Project (LGPL) — github.com/parsimonhi/animCJK
</footer>

</div><!-- /app-wrap -->

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <h2 class="mincho">五十音 一覧</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="gyouContainer"></div>
  </div>

const MASCOT_BROWN_SVG = '<img src="'+NYANKUMA_IMG+'" alt="にゃんくま" style="width:100%;height:100%;object-fit:contain;">';

document.getElementById('coverMascotL').innerHTML = MASCOT_RED_SVG;
document.getElementById('coverMascotR').innerHTML = MASCOT_BROWN_SVG;

let idx = 0;
const total = DATA.length;

const charWrap = document.getElementById('charWrap');
const mascotBadge = document.getElementById('mascotBadge');
const romajiEl = document.getElementById('romaji');
const romajiNeEl = document.getElementById('romajiNe');
const exEmoji = document.getElementById('exEmoji');
const exKana = document.getElementById('exKana');
const exRomaji = document.getElementById('exRomaji');
const exMeaning = document.getElementById('exMeaning');
const exMeaningNe = document.getElementById('exMeaningNe');
const stampNum = document.getElementById('stampNum');
const rowChip = document.getElementById('rowChip');
const countChip = document.getElementById('countChip');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const replayBtn = document.getElementById('replayBtn');
const playBtn = document.getElementById('playBtn');
let isPlaying = false;
let playTimer = null;
const PLAY_INTERVAL_MS = 5000;
const progressWrap = document.getElementById('progressWrap');
const gridToggle = document.getElementById('gridToggle');
const modalBackdrop = document.getElementById('modalBackdrop');
const modalClose = document.getElementById('modalClose');
const gyouContainer = document.getElementById('gyouContainer');
const coverScreen = document.getElementById('coverScreen');
const coverStart = document.getElementById('coverStart');
const appWrap = document.getElementById('appWrap');

coverStart.addEventListener('click', ()=>{
  coverScreen.classList.add('hidden');
  appWrap.classList.add('visible');
  renderChar();
});

function pad(n){ return String(n).padStart(2,'0'); }

function renderChar(){
  const item = DATA[idx];
  charWrap.innerHTML = SVGMAP[String(item.cp)] + '<div class="replay-hint">↻ タップで再生</div>';
  romajiEl.textContent = item.romaji;
  romajiNeEl.textContent = item.kanaNe;
  exEmoji.textContent = item.emoji;
  exKana.textContent = item.exKana;
  exRomaji.textContent = item.exRomaji;
  exMeaning.textContent = item.meaning;
  exMeaningNe.textContent = item.meaningNe;
  stampNum.textContent = pad(idx+1);
  rowChip.textContent = item.row;
  countChip.textContent = pad(idx+1) + ' / ' + total;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === total-1;
  mascotBadge.innerHTML = (idx % 2 === 0) ? MASCOT_RED_SVG : MASCOT_BROWN_SVG;
  updateDots();
}

function updateDots(){
  [...progressWrap.children].forEach((d,i)=>{
    d.classList.toggle('active', i===idx);
    d.classList.toggle('done', i<idx);
  });
}

function buildDots(){
  DATA.forEach((item,i)=>{
    const b = document.createElement('button');
    b.className = 'dot';
    b.title = item.kana + ' (' + item.romaji + ')';
    b.addEventListener('click', ()=>{ stopPlay(); idx = i; renderChar(); });
    progressWrap.appendChild(b);
  });
}

function go(delta){
  const n = idx + delta;
  if(n < 0 || n >= total) return;
  idx = n;
  renderChar();
}

function stopPlay(){
  isPlaying = false;
  clearInterval(playTimer);
  playTimer = null;
  playBtn.textContent = '▶ スタート';
  playBtn.classList.remove('playing');
}

function startPlay(){
  isPlaying = true;
  playBtn.textContent = '⏸ 一時停止';
  playBtn.classList.add('playing');
  clearInterval(playTimer);
  playTimer = setInterval(()=>{
    if(idx < total - 1){
      idx++;
      renderChar();
    } else {
      stopPlay();
    }
  }, PLAY_INTERVAL_MS);
}

prevBtn.addEventListener('click', ()=>{ stopPlay(); go(-1); });
nextBtn.addEventListener('click', ()=>{ stopPlay(); go(1); });
replayBtn.addEventListener('click', renderChar);
playBtn.addEventListener('click', ()=>{ isPlaying ? stopPlay() : startPlay(); });
charWrap.addEventListener('click', renderChar);
charWrap.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); renderChar(); } });

document.addEventListener('keydown', (e)=>{
  if(modalBackdrop.classList.contains('open')){
    if(e.key === 'Escape') closeModal();
    return;
  }
  if(e.key === 'ArrowRight'){ stopPlay(); go(1); }
  else if(e.key === 'ArrowLeft'){ stopPlay(); go(-1); }
  else if(e.key === ' '){ e.preventDefault(); renderChar(); }
  else if(e.key.toLowerCase() === 'g') openModal();
});

function openModal(){ modalBackdrop.classList.add('open'); }
function closeModal(){ modalBackdrop.classList.remove('open'); }
gridToggle.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e)=>{ if(e.target === modalBackdrop) closeModal(); });

function buildGrid(){
  const rows = [];
  const seen = {};
  DATA.forEach(item=>{
    if(!seen[item.row]){ seen[item.row]=true; rows.push(item.row); }
  });
  rows.forEach(rowName=>{
    const block = document.createElement('div');
    block.className = 'gyou-block';
    const label = document.createElement('div');
    label.className = 'gyou-label jp';
    label.textContent = rowName;
    block.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'gyou-grid';
    DATA.forEach((item,i)=>{
      if(item.row !== rowName) return;
      const cell = document.createElement('div');
      cell.className = 'kana-cell';
      cell.innerHTML = '<div class="glyph jp">'+item.kana+'</div><div class="rmj">'+item.romaji+' / '+item.kanaNe+'</div>';
      cell.addEventListener('click', ()=>{
        stopPlay();
        idx = i;
        renderChar();
        closeModal();
        window.scrollTo({top:0, behavior:'smooth'});
      });
      grid.appendChild(cell);
    });
    block.appendChild(grid);
    gyouContainer.appendChild(block);
  });
}

buildDots();
buildGrid();
renderChar();
</script>
